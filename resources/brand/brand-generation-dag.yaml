# generate-brand-kit brand generation DAG — "kit-of-parts" identity (v2)
# Serial DAG: each task references the approved output of the previous one.
# Standing negative constraints appended per references/prompt-patterns.md.

tasks:
  - id: foundation-material-board
    name: 01-kit-foundation-board
    ratio: "16:9"
    prompt: >-
      Create a material and palette reference board, not a logo, for a
      precision brand-assembly tool. Arrange flat die-cut card parts —
      quarter-discs, triangles, dots, square blocks — laid out in an
      orderly drafting-table grid on warm off-white paper #FAF7F0.
      Colors: vermilion #E4572E, cobalt #274690, warm graphite #1A1917.
      Silkscreen-print feel, flat solid inks, crisp edges, very subtle
      paper grain. Mood: print workshop precision, kit of parts ready for
      assembly. No text, no logo, no watermark, no gradients, no
      glassmorphism, no sparkle icons, no fake 3D depth.

  - id: core-mark-seed
    name: 02-kit-core-mark
    ratio: "1:1"
    refs: ["@foundation-material-board"]
    prompt: >-
      Design a logo mark using the referenced material board: one square
      assembled from four quadrant tiles, each tile a DIFFERENT flat
      geometric part — top-left a vermilion #E4572E quarter-disc, top-right
      a cobalt #274690 diagonal half-square triangle, bottom-left a graphite
      #1A1917 square containing a small paper #FAF7F0 dot, bottom-right a
      solid graphite block pulled slightly outward with a visible gap, as
      if snapping into place. Flat solid vector shapes on plain paper
      #FAF7F0 background, centered, readable at 32 px. Reading: a kit of
      parts assembling into one brand mark. Must NOT read as the Microsoft
      four-color flag: shapes differ per tile, one tile detached. No
      gradients, no glassmorphism, no sparkles, no 3D bevels, no text,
      no watermark.

  - id: production-clean-mark
    name: 03-kit-clean-mark
    ratio: "1:1"
    refs: ["@core-mark-seed"]
    prompt: >-
      Simplify the referenced approved mark for production vectorization.
      Preserve exactly: square of four distinct part-tiles (quarter-disc,
      triangle, dot-in-square, solid block) with the bottom-right block
      offset by a snap gap. Flatten to hard-edged solid fills — vermilion
      #E4572E, cobalt #274690, graphite #1A1917, paper #FAF7F0 — zero
      texture, zero gradient, maximum silhouette clarity at 32 px, plain
      paper background. No text, no watermark, no background scene.

  - id: hero-background
    name: 04-kit-hero
    ratio: "21:9"
    refs: ["@production-clean-mark"]
    prompt: >-
      Create a wide README hero image using the referenced approved mark.
      Warm graphite #1A1917 drafting-table surface; on the right third,
      flat die-cut parts in vermilion #E4572E, cobalt #274690 and paper
      #FAF7F0 slide into place around the assembled square mark, with thin
      paper-colored alignment guides. Left two thirds stay dark, calm and
      low-noise for overlaid text and badges. Flat silkscreen-print style,
      subtle paper grain, no glow, no neon. No generated text, no extra
      logos, no watermark, no gradients, no glassmorphism, no sparkles.

  - id: social-preview
    name: 05-kit-social
    ratio: "16:9"
    refs: ["@production-clean-mark"]
    prompt: >-
      Create a social preview card background using the referenced approved
      mark at medium size, center-left, on a warm graphite #1A1917 surface
      with a few flat kit parts and thin paper alignment guides around it;
      right side calm and empty. Same flat print-craft rules as the hero.
      No generated text, no watermark, no gradients, no sparkles.
